services:
    auth:
        command: bun run start:dev
        volumes:
            - ./luniverso-auth:/app
            - /app/node_modules

    site:
        command: bun run dev
        volumes:
            - ./luniverso-site:/app
            - /app/node_modules

    game-static:
        command: bun run dev:static # ajustar depois
        volumes:
            - ./luniverso-game:/app
            - /app/node_modules

    game-server:
        command: bun run dev:server # ajustar depois
        volumes:
            - ./luniverso-game:/app
            - /app/node_modules

    nginx:
        ports:
            - "80:80"
