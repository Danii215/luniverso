# ─── planet.danitest.com.br → game ─────────────────────────────
server {
    listen 80;
    server_name planet.danitest.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name planet.danitest.com.br;

    ssl_certificate     /etc/letsencrypt/live/planet.danitest.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/planet.danitest.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Arquivos estáticos do Three.js
    location / {
        proxy_pass http://game-static:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws {
        proxy_pass http://game-server:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
    }
}