# ─── danitest.com.br → site ────────────────────────────────────
server {
    listen 80;
    server_name danitest.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name danitest.com.br;

    ssl_certificate     /etc/letsencrypt/live/danitest.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/danitest.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://site:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

