services:
    # ─── Infraestrutura ───────────────────────────────────────────
    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: luniverso
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: luniverso_auth
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        volumes:
            - redis_data:/data

    migrate:
        build:
            context: ./luniverso-auth
            dockerfile: Dockerfile
        env_file: .env.${ENV:-production}
        depends_on:
            - postgres
        command: npx prisma migrate deploy
        restart: no
    # ─── Aplicações ───────────────────────────────────────────────
    auth:
        build:
            context: ./luniverso-auth
            dockerfile: Dockerfile
        restart: unless-stopped
        env_file: .env.${ENV:-production}
        depends_on:
            - postgres
            - redis

    site:
        build:
            context: ./luniverso-site
            dockerfile: Dockerfile
            args:
                NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        restart: unless-stopped
        env_file: .env.${ENV:-production}

    game-static:
        build:
            context: ./luniverso-game
            dockerfile: Dockerfile.static
            args:
                PUBLIC_WS_URL: ${PUBLIC_WS_URL}
        restart: unless-stopped
        env_file: .env.${ENV:-production}

    game-server:
        build:
            context: ./luniverso-game
            dockerfile: Dockerfile.server
            args:
                PUBLIC_WS_URL: ${PUBLIC_WS_URL}
        restart: unless-stopped
        env_file: .env.${ENV:-production}
    # ─── Proxy ────────────────────────────────────────────────────
    nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./infra/nginx/${ENV:-production}.conf:/etc/nginx/conf.d/default.conf:ro
            - /etc/letsencrypt:/etc/letsencrypt:ro
        depends_on:
            - auth
            - site
            - game-static
            - game-server

volumes:
    postgres_data:
    redis_data:
